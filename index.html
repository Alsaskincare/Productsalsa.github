<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<meta name="viewport" content="width=device-width, height=device-height, user-scalable=no" />

		<title>Guide</title>

		<link rel="stylesheet" href="themes/jquery.mobile-1.1.1.min.css" />
		<link rel="stylesheet" href="themes/ui.css" />

		<script src="themes/jquery-1.7.2.min.js"></script>
		<script src="js/custom-scripting-guide.js"></script>
		<script src="themes/jquery.mobile-1.1.1.min.js"></script>
	</head>

	<body>

	<!-- トップ画面 -->
	<div id="guide_top" data-role="page" data-theme="d" style="overflow: hidden;">
		<div data-role="content" data-theme="d" class="page_content">
			<div class="grids">
				<div class="grid10">
					<img src="img/top_title_e.png" style="width: 71%; height: auto; margin-top: 4%;" /><br />
				</div>
				<div class="grid10">
					<input type="text" disabled style="position: absolute; width: 68%; height: 52px; margin-top:4.2%; margin-left: 16.5%; float: left; border: 1px #bdbcbd solid; box-shadow: none; z-index: 1;" />
					<input type="text" id="search_text" style="position: absolute; width: 51.5%; height: 47px; margin-top: 4.5%; margin-left: 16.7%; float: left; border: none; box-shadow: none; z-index: 2; font-size:21px;"  />
					<a id="search_button"><img src="img/kensaku_off.png" style="position: absolute; width: 18%; margin-top: 4.1%; left: 66.5%; float: left; z-index: 2;" data-role="none" /></a>
					<img src="img/kensaku_text.png" id="placeholder_img" style="position: absolute; width: 47%; margin-top: 4.5%; border: none; box-shadow: none; z-index: 2;" />
				</div>
				<div class="grid10" style="margin-top: 19.5%;margin-bottom:6%;">
					<a href="index-manual.html" data-ajax="false"><img src="img/button2_off.png" class="img_label2" /></a><br />
					<a href="index-faq.html" data-ajax="false"><img src="img/button3_off.png" class="img_label2" /></a><br />
					<img src="img/transparent_button.png" class="img_label2" /><br />
					<img src="img/transparent_button2.png" class="img_label2" /><br />

				</div>
			</div>
		</div>
		<script type="text/javascript">
		<!--
		$('#guide_top').live('pagebeforeshow', function() {
			$('#placeholder_img').css("display","block");
			$('#placeholder_img').css("margin-left","17%");
		});
		$('#guide_top').live('pageshow', function() {
			module.setPageTitle('Guide');
			module.setPageData('searchTextHistory', null);
		});
		$('#search_button').live('click', function() {
			var searchText = $('#search_text').val();
			if ((searchText != null) && (searchText.length > 0)) {
				// キーワードが入力されている場合は入力内容を保持し、検索画面に遷移
				module.setPageData('searchText', searchText);
				location.href = 'index-search.html';
			} else {
				// キーワードが入力されていない場合はToastを表示
				$('#toast_msg').html('<font size="4px" >Enter Keyword.</font>');
				$.mobile.changePage('#guide_toast-01', { transition: 'none', role: 'dialog' });
			}
		});
		$('#placeholder_img').live('click',function() {
			$('#placeholder_img').css("display","none");
			$('#search_text').focus();
		});
		$('#search_text').blur(function() {
			var searchText = $('#search_text').val();
			if((searchText == null) || (searchText.length == 0)){
				$('#placeholder_img').css("display","block");
			}
		});
		$(document).ready(function() {
			var searchText = $('#search_text').val();
			if((searchText != null) && (searchText.length > 0)){
				$('#placeholder_img').css("display","none");
			}
		});
		//-->
		</script>
	</div>
	<!-- トップ画面 -->

	<!-- 検索キーワードが未入力な場合のToast表示 -->
	<div id="guide_toast-01" data-role="page" style="z-index:20; width:80%; top: 75%; left:10%;">
		<div data-role="content" data-theme="a">
			<div align="center" id="toast_msg"></div>
		</div>
		<script type="text/javascript">
		<!--
			var toastTimerId = null;
			$('#guide_toast-01').live('pagebeforeshow', function() {

					clearTimeout(toastTimerId);
					toastTimerId = null;
				}
			});
		//-->
		</script>
	</div>
	<!-- 検索キーワードが未入力な場合のToast表示 -->

	</body>
</html>
